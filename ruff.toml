[tool.ruff]
# Target Python 3.11+
target-version = "py311"

# Enable all rules except those that would conflict with formatter
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]

# Ignore specific rules
ignore = [
    "E501",  # Line too long (handled by formatter)
    "B008",  # Do not perform function calls in argument defaults
]

# Exclude files/directories
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
    "site-packages",
]

[tool.ruff.per-file-ignores]
# Tests can have more lenient rules
"tests/**/*.py" = [
    "E501",
    "B011",
]

[tool.ruff.mccabe]
# Maximum line complexity
max-complexity = 10

[tool.ruff.isort]
# Configure isort compatibility
known-first-party = ["thefuck"]